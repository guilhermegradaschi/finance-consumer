# ClusterIssuer example for cert-manager (Let's Encrypt).
# Apply once per cluster (or use an existing issuer name and set the same in ingress annotation).
# Staging issuer is recommended first to avoid rate limits: https://letsencrypt.org/docs/staging-environment/
#
#   kubectl apply -f k8s/cluster-issuer.example.yaml
#
# Replace email and ingress class; for production switch to letsencrypt-prod ACME server.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: platform@example.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: platform@example.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
