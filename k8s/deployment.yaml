apiVersion: apps/v1
kind: Deployment
metadata:
  name: nf-processor
  namespace: nf-processor
  labels:
    app: nf-processor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nf-processor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nf-processor
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: nf-processor
          image: nf-processor:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nf-processor-config
            - secretRef:
                name: nf-processor-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
