# ClusterSecretStore example — cluster-scoped store for External Secrets Operator.
# Adjust provider (AWS Secrets Manager, Vault, GCP, etc.) and auth to your platform.
# Docs: https://external-secrets.io/latest/provider/aws-secrets-manager/
#
# EKS (IRSA): annotate the External Secrets Operator service account with the IAM role ARN
# that can read the secrets; use auth.jwt.serviceAccountRef pointing at that SA, or use
# pod identity as documented for your ESO version.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: cluster-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
