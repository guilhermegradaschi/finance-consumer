# ExternalSecret example — syncs remote secrets into a Kubernetes Secret consumed by the Deployment.
# Prerequisites: External Secrets Operator installed + ClusterSecretStore (see cluster-secret-store.example.yaml).
# Copy to external-secret.yaml, adjust remoteRef keys/properties to match your secret manager layout, then:
#   kubectl apply -f k8s/external-secret.yaml
#
# Target Secret name must match deployment envFrom.secretRef (default: nf-processor-secrets).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nf-processor-external-secret
  namespace: nf-processor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: nf-processor-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: nf-processor/prod
        property: DB_USERNAME
    - secretKey: DB_PASSWORD
      remoteRef:
        key: nf-processor/prod
        property: DB_PASSWORD
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: nf-processor/prod
        property: REDIS_PASSWORD
    - secretKey: RABBITMQ_USERNAME
      remoteRef:
        key: nf-processor/prod
        property: RABBITMQ_USERNAME
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: nf-processor/prod
        property: RABBITMQ_PASSWORD
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: nf-processor/prod
        property: S3_ACCESS_KEY
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: nf-processor/prod
        property: S3_SECRET_KEY
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: nf-processor/prod
        property: S3_ENDPOINT
    - secretKey: JWT_SECRET
      remoteRef:
        key: nf-processor/prod
        property: JWT_SECRET
